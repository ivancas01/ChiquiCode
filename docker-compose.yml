services:
  web:
    image: nginx:alpine
    container_name: chiquicode
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chiquicode.rule=Host(`chiquicode.com`)"
      - "traefik.http.services.chiquicode.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
